name: Deploy Web Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "web/**" # Odpala się tylko, gdy zmienisz coś w folderze strony

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js ⚙️
        uses: actions/checkout@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install and Build 🏗️
        run: |
          cd web
          pnpm install
          pnpm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web/dist
          branch: gh-pages # Tutaj GitHub Actions wypchnie gotową stronę
